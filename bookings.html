// Fetch passenger count & trip type from URL
function getSearchParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    from: params.get("from") || "",
    to: params.get("to") || "",
    passengers: parseInt(params.get("passengers")) || 1,

}

// NAVBAR
function renderNavbar() {
  const navLinks = document.getElementById("navLinks");
  const navAuth = document.getElementById("navAuth");
  navLinks.innerHTML = navAuth.innerHTML = "";

  if(!isLoggedIn){
    navLinks.innerHTML = `<li class="nav-item"><a class="nav-link" href="#">Holiday Packages</a></li>`;
    navAuth.innerHTML = `
      <button class="btn btn-outline-light me-2" onclick="redirectToLogin()">Sign In</button>
      <button class="btn btn-primary" onclick="redirectToSignup()">Sign Up</button>
    `;
  } else {
    navLinks.innerHTML = `
      <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
      <li class="nav-item"><a class="nav-link active" href="bookings.html">Bookings</a></li>
      <li class="nav-item"><a class="nav-link" href="packages.html">Holiday Packages</a></li>
    `;
    navAuth.innerHTML = `
      <div class="dropdown">
        <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">👤 Profile</button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" onclick="showProfile()">My Profile</a></li>
          <li><a class="dropdown-item" onclick="logout()">Logout</a></li>
        </ul>
      </div>
    `;
  }
}

function redirectToLogin(){ window.location.href="loginpage.html"; }
function redirectToSignup(){ window.location.href="signup.html"; }
function logout(){ localStorage.clear(); alert("Logged out!"); window.location.href="loginpage.html"; }
function showProfile(){ alert(`Hello, ${localStorage.getItem("username") || "User"}!`); }

// DISPLAY CURRENT BOOKINGS
function displayCurrentBookings() {
  const current = document.getElementById("currentBookings");
  const bookings = JSON.parse(localStorage.getItem("bookings") || "[]");
  current.innerHTML = "";

  if(bookings.length === 0){
    current.innerHTML = "<p class='text-muted'>No bookings yet.</p>";
    return;
  }

  bookings.forEach((b, index) => {
    const div = document.createElement("div");
    div.className = "booking-card d-flex justify-content-between align-items-start";
    div.innerHTML = `
      <div>
        <strong>${b.type}: ${b.route}</strong><br>
        Trip Type: ${b.tripType}<br>
        Departure: ${b.time}<br>
        Vehicle: ${b.vehicle}<br>
        Tickets: ${b.tickets}<br>
        Total: ₹${b.total}
      </div>
      <div>
        <button class="btn btn-sm btn-danger btn-cancel" onclick="cancelBooking(${index})">Cancel</button>
      </div>
    `;
    current.appendChild(div);
  });
}

// CANCEL BOOKING
function cancelBooking(index) {
  let bookings = JSON.parse(localStorage.getItem("bookings") || "[]");
  if(confirm("Are you sure you want to cancel this booking?")){
    bookings.splice(index, 1);
    localStorage.setItem("bookings", JSON.stringify(bookings));
    displayCurrentBookings();
  }
}

// FILTER BOOKINGS BASED ON SEARCH
function filterBookings() {
  const {from, to} = getSearchParams();
  if(!from && !to) return bookingData;
  return bookingData.filter(item => 
    item.route.toLowerCase().includes(from.toLowerCase()) &&
    item.route.toLowerCase().includes(to.toLowerCase())
  );
}

// DISPLAY OPTIONS
function displayBookingOptions() {
  const filtered = filterBookings();
  const trainList = document.getElementById("trainList");
  const flightList = document.getElementById("flightList");
  const busList = document.getElementById("busList");

  trainList.innerHTML = flightList.innerHTML = busList.innerHTML = "";

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "d-flex justify-content-between border-bottom py-2 align-items-center";
    div.innerHTML = `
      <div>
        <strong>${item.route}</strong><br>
        <small class="text-muted">${item.time}</small>
      </div>
      <div class="text-end">
        <span class="text-success fw-bold">₹${item.price}</span><br>
        <small>${item.vehicle}</small><br>
        <small>${tripType} | ${passengers} Passenger(s)</small><br>
        <button class="btn btn-sm btn-primary mt-1" onclick="bookNow('${item.type}','${item.route}','${item.time}',${item.price},'${item.vehicle}')">Book Now</button>
      </div>
    `;

    if(item.type==="Train") trainList.appendChild(div);
    if(item.type==="Flight") flightList.appendChild(div);
    if(item.type==="Bus") busList.appendChild(div);
  });

  if(!trainList.innerHTML) trainList.innerHTML="<p class='text-muted'>No trains found.</p>";
  if(!flightList.innerHTML) flightList.innerHTML="<p class='text-muted'>No flights found.</p>";
  if(!busList.innerHTML) busList.innerHTML="<p class='text-muted'>No buses found.</p>";
}

// BOOK NOW AUTOMATICALLY TAKES PASSENGERS & TRIP TYPE
function bookNow(type, route, time, price, vehicle){
  if(!isLoggedIn) return alert("Please login to book!");

  const ticketCount = passengers;
  const multiplier = tripType === "Round Trip" ? 2 : 1;
  const grandTotal = ticketCount * price * multiplier;

  if(!confirm(`Confirm Booking?\nType: ${type}\nRoute: ${route}\nDeparture: ${time}\nVehicle: ${vehicle}\nTrip: ${tripType}\nTickets: ${ticketCount}\nTotal: ₹${grandTotal}`)) return;

  const existing = JSON.parse(localStorage.getItem("bookings") || "[]");
  existing.push({type, route, time, price, vehicle, tickets: ticketCount, total: grandTotal, tripType});
  localStorage.setItem("bookings", JSON.stringify(existing));
  alert("Booking confirmed!");
  displayCurrentBookings();
}

// INIT
renderNavbar();
displayCurrentBookings();
displayBookingOptions();

// Animate sections
document.querySelectorAll(".section").forEach(s => setTimeout(()=>s.classList.add("visible"),100));
