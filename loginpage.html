<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Site - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
  body, html {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .login-card {
    background: rgba(255, 255, 255, 0.97);
    padding: 3rem 2.5rem;        /* expanded padding */
    border-radius: 16px;         /* slightly rounder */
    box-shadow: 0 12px 28px rgba(0,0,0,0.35);
    width: 100%;
    max-width: 450px;            /* slightly wider */
    transition: transform 0.3s ease;
  }
  .login-card:hover {
    transform: translateY(-5px); /* subtle hover lift */
  }
  .login-card h2 {
    text-align: center;
    margin-bottom: 2rem;         /* more breathing room */
    font-weight: 700;
  }
  .login-card .form-label {
    font-weight: 500;
  }
  .login-card p {
    font-size: 0.9rem;
  }
</style>
</head>
<body>

  <div class="login-card">
    <h2>Sign In</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Username or Email</label>
        <input type="text" class="form-control" id="username" placeholder="Enter username/email" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>
      <p class="text-center mt-3">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </p>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if(username && password) {
        // Store user info in localStorage (for simulation)
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('username', username);

        alert('Login successful! Redirecting...');
        window.location.href = 'index.html'; // redirect to main page
      } else {
        alert('Please enter both username and password.');
      }
    });

    // Optional: auto-redirect if already logged in
    if(localStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = 'index.html';
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
