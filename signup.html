<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Site - Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .signup-card {
      background: rgba(255, 255, 255, 0.97);
      padding: 3rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
      width: 100%;
      max-width: 500px;
      transition: transform 0.3s ease;
    }

    .signup-card:hover {
      transform: translateY(-5px);
    }

    .signup-card h2 {
      text-align: center;
      margin-bottom: 2rem;
      font-weight: 700;
    }

    .signup-card .form-label {
      font-weight: 500;
    }

    .signup-card p {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="signup-card">
    <h2>Create Account</h2>
    <form id="signupForm">

      <div class="mb-3">
        <label for="fullname" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="fullname" placeholder="Enter your full name" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phone" placeholder="Enter phone number" required>
      </div>

      <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <textarea class="form-control" id="address" placeholder="Enter your address" rows="2" required></textarea>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Sign Up</button>

      <p class="text-center mt-3">
        Already have an account? <a href="loginpage.html">Login</a>
      </p>

    </form>
  </div>

  <script>
    const signupForm = document.getElementById('signupForm');

    signupForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const fullname = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      const password = document.getElementById('password').value.trim();

      if(fullname && email && phone && address && password) {
        // Store signup info in localStorage (simulation)
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('username', fullname);
        localStorage.setItem('email', email);
        localStorage.setItem('phone', phone);
        localStorage.setItem('address', address);

        alert('Signup successful! Redirecting to main page...');
        window.location.href = 'index.html'; // redirect to main page
      } else {
        alert('Please fill in all fields.');
      }
    });

    // Optional: auto-redirect if already logged in
    if(localStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = 'index.html';
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
